version: "3.9"

services:
  client:
    build:
      context: .
      dockerfile: docker/client.Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./client/.env
    depends_on:
      - server
    networks:
      - app-network

  server:
    build:
      context: .
      dockerfile: docker/server.Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    networks:
      - app-network

  # Firebase Emulator Suite (local development)
  firebase-emulator:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./firebase:/app
    ports:
      - "4000:4000"  # Emulator UI
      - "8080:8080"  # Firestore
      - "8081:8081"  # Auth
      - "9000:9000"  # Storage
      - "9099:9099"  # Functions
    command: >
      sh -c "npm install -g firebase-tools &&
             firebase emulators:start --project demo-project"
    networks:
      - app-network

volumes:
  firebase_data:

networks:
  app-network:
    driver: bridge